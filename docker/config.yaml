# MediaWarp + FontInAss 容器化配置

port: 9000                                  # MediaWarp 监听端口

server:                                     # 媒体服务器相关设置
  type: Emby                                # 媒体服务器类型（可选选项：Emby、Jellyfin、 FNTV）
  addr: http://your-media-server:8096      # 媒体服务器地址
  auth: your-api-key                       # 媒体服务器认证方式

log:                                        # 日志设定
  access:                                   # 访问日志设定
    enable: true                           # 启用访问日志
    format: "${time} | ${ip} \"${method} ${path} ${protocol}\" | ${status} | ${latency} | ${userAgent}"
  level: info                              # 日志等级（可选选项：debug、info、warning、error）

cache:                                      # 缓存设定
  enable: true                             # 启用缓存
  image_ttl: 24h                           # 图片缓存过期时间
  subtitle_ttl: 24h                        # 字幕缓存过期时间

subtitle:                                   # 字体相关设置（仅 Emby 支持）
  enable: true                             # 启用
  srt2ass: false                           # SRT 字幕转 ASS 字幕
  ass_style:                               # SRT 字幕转 ASS 字幕使用的样式
    - "Format: Name, Fontname, Fontsize, PrimaryColour, SecondaryColour, OutlineColour, BackColour, Bold, Italic, Underline, StrikeOut, ScaleX, ScaleY, Spacing, Angle, BorderStyle, Outline, Shadow, Alignment, MarginL, MarginR, MarginV, Encoding"
    - "Style: Default,文楷,20,&H03FFFFFF,&H00FFFFFF,&H00000000,&H02000000,-1,0,0,0,100,100,0,0,1,1,0,2,10,10,10,1"
  subset: true                             # ASS 字幕字体子集化（需要配合 FontInAss 使用）
  fontinass:                               # FontInAss 配置
    addr: http://localhost:8011            # FontInAss 服务地址（容器内部通信）
    timeout: 30s                           # FontInAss 请求超时时间

web:                                        # 网页设定
  title: "MediaWarp"                       # 网页标题
  robots: "User-agent: *\nDisallow: /"    # 网页爬虫设定